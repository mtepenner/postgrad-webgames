<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebArena: Quake-Style FPS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background-color: rgba(255, 255, 255, 0.8);
        }
        #crosshair::before {
            top: 9px; left: 0; width: 20px; height: 2px;
        }
        #crosshair::after {
            top: 0; left: 9px; width: 2px; height: 20px;
        }
        #blocker {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            pointer-events: auto;
            z-index: 50;
        }
        .retro-text {
            color: #d2b48c; /* Tan/Brownish */
            text-shadow: 2px 2px 0px #4a3c31;
            font-weight: bold;
            text-transform: uppercase;
        }
        #damage-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 0, 0, 0);
            pointer-events: none;
            transition: background-color 0.1s ease-out;
            z-index: 10;
        }
    </style>
</head>
<body>

<div id="game-container"></div>

<div id="damage-overlay"></div>

<div id="ui-layer" class="p-6">
    <div class="flex justify-between w-full">
        <div class="retro-text text-3xl" id="score-display">FRAGS: 0</div>
        <div class="retro-text text-3xl text-red-500" id="wave-display">WAVE: 1</div>
    </div>
    
    <div id="crosshair"></div>

    <div class="flex justify-between w-full items-end">
        <div class="retro-text text-5xl flex items-center gap-2">
            <span class="text-red-600">❤</span> <span id="health-display">100</span>
        </div>
        <div class="retro-text text-5xl flex items-center gap-2">
            <span class="text-yellow-500">⚡</span> <span id="ammo-display">50</span>
        </div>
    </div>
</div>

<div id="blocker">
    <h1 class="retro-text text-7xl mb-4 tracking-widest text-orange-500">WEBARENA</h1>
    <p class="text-gray-300 text-xl mb-6 font-mono max-w-lg text-center">
        WASD to move. Mouse to look. Left Click to shoot.<br><br>
        Survive the endless waves.
    </p>

    <div class="flex gap-6 mb-8 text-xl font-mono text-white">
        <label class="cursor-pointer hover:text-green-400"><input type="radio" name="difficulty" value="easy" class="mr-2">Easy</label>
        <label class="cursor-pointer hover:text-yellow-400"><input type="radio" name="difficulty" value="normal" checked class="mr-2">Normal</label>
        <label class="cursor-pointer hover:text-red-400"><input type="radio" name="difficulty" value="hard" class="mr-2">Hard</label>
    </div>

    <button id="start-btn" class="px-8 py-4 bg-orange-700 hover:bg-orange-600 text-white font-bold text-2xl border-4 border-orange-900 rounded transition-colors shadow-[4px_4px_0px_#3a2010]">
        CLICK TO ENTER ARENA
    </button>
</div>

<!-- Three.js and PointerLockControls from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

<script>
window.onload = function() {
    // --- Configuration & State ---
    const config = {
        playerSpeed: 300.0,
        jumpForce: 250.0,
        gravity: 600.0,
        playerHeight: 10,
        enemySpeed: 50.0,
        fireRate: 0.15, // seconds between shots
        maxHealth: 100,
        maxAmmo: 100,
        enemyDamage: 10,
        enemyHealthBase: 3
    };

    function applyDifficulty() {
        const diff = document.querySelector('input[name="difficulty"]:checked').value;
        if (diff === 'easy') { config.enemySpeed = 30; config.enemyDamage = 5; config.enemyHealthBase = 2; }
        else if (diff === 'normal') { config.enemySpeed = 50; config.enemyDamage = 10; config.enemyHealthBase = 3; }
        else if (diff === 'hard') { config.enemySpeed = 80; config.enemyDamage = 20; config.enemyHealthBase = 5; }
    }

    let state = {
        health: config.maxHealth,
        ammo: 50,
        frags: 0,
        wave: 1,
        isGameOver: false,
        lastFireTime: 0
    };

    // --- Core Variables ---
    let camera, scene, renderer, controls;
    const objects = []; // Collidable geometry (walls, floors)
    const enemies = [];
    const particles = [];
    const textures = {};
    
    let raycaster;
    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    let canJump = false;
    let prevTime = performance.now();
    let velocity = new THREE.Vector3();
    let direction = new THREE.Vector3();

    // Weapon internals
    let weaponPivot, weaponMesh, muzzleFlash;
    let isFiring = false;
    let recoilTime = 0;

    // DOM Elements
    const blocker = document.getElementById('blocker');
    const startBtn = document.getElementById('start-btn');
    const damageOverlay = document.getElementById('damage-overlay');
    const healthDisplay = document.getElementById('health-display');
    const ammoDisplay = document.getElementById('ammo-display');
    const scoreDisplay = document.getElementById('score-display');
    const waveDisplay = document.getElementById('wave-display');

    init();
    animate();

    function init() {
        // 1. Scene Setup
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x101018); // Dark night sky
        scene.fog = new THREE.Fog(0x101018, 20, 300); // Dark city fog

        // 2. Camera & Lighting
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.y = config.playerHeight;

        const ambientLight = new THREE.AmbientLight(0x404040, 1.5); // Soft white light
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffeedd, 0.8);
        dirLight.position.set(100, 200, 50);
        scene.add(dirLight);

        // 3. Controls (Pointer Lock)
        controls = new THREE.PointerLockControls(camera, document.body);

        startBtn.addEventListener('click', () => {
            applyDifficulty();
            if(state.isGameOver) resetGame();
            controls.lock();
        });

        controls.addEventListener('lock', () => {
            blocker.style.display = 'none';
        });

        controls.addEventListener('unlock', () => {
            if(!state.isGameOver) blocker.style.display = 'flex';
        });

        scene.add(controls.getObject());

        // 4. Input Handling
        const onKeyDown = function (event) {
            switch (event.code) {
                case 'ArrowUp': case 'KeyW': moveForward = true; break;
                case 'ArrowLeft': case 'KeyA': moveLeft = true; break;
                case 'ArrowDown': case 'KeyS': moveBackward = true; break;
                case 'ArrowRight': case 'KeyD': moveRight = true; break;
                case 'Space': if (canJump === true) velocity.y += config.jumpForce; canJump = false; break;
            }
        };

        const onKeyUp = function (event) {
            switch (event.code) {
                case 'ArrowUp': case 'KeyW': moveForward = false; break;
                case 'ArrowLeft': case 'KeyA': moveLeft = false; break;
                case 'ArrowDown': case 'KeyS': moveBackward = false; break;
                case 'ArrowRight': case 'KeyD': moveRight = false; break;
            }
        };

        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup', onKeyUp);
        
        // Shooting
        document.addEventListener('mousedown', (e) => {
            if (controls.isLocked && e.button === 0) shoot();
        });

        // 5. Build Environment
        createMaterials();
        buildArena();
        createWeapon();

        // 6. Raycaster
        raycaster = new THREE.Raycaster();

        // 7. Renderer
        renderer = new THREE.WebGLRenderer({ antialias: false }); // False for more retro feel
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('game-container').appendChild(renderer.domElement);

        window.addEventListener('resize', onWindowResize);
        
        // Initial spawn
        spawnWave();
    }

    // --- Procedural Textures ---
    function createMaterials() {
        // Generate a noisy canvas texture
        function generateNoiseTex(w, h, colorBase, variance) {
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            const imgData = ctx.createImageData(w, h);
            
            for (let i = 0; i < imgData.data.length; i += 4) {
                let noise = (Math.random() - 0.5) * variance;
                imgData.data[i] = Math.min(255, Math.max(0, colorBase[0] + noise));     // R
                imgData.data[i+1] = Math.min(255, Math.max(0, colorBase[1] + noise));   // G
                imgData.data[i+2] = Math.min(255, Math.max(0, colorBase[2] + noise));   // B
                imgData.data[i+3] = 255;                                                // A
            }
            ctx.putImageData(imgData, 0, 0);
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            tex.magFilter = THREE.NearestFilter; // Pixelated retro look
            return tex;
        }

        // Road Texture
        const roadCanvas = document.createElement('canvas');
        roadCanvas.width = 256; roadCanvas.height = 256;
        const rctx = roadCanvas.getContext('2d');
        rctx.fillStyle = '#222'; rctx.fillRect(0,0,256,256);
        for(let i=0; i<5000; i++) {
            rctx.fillStyle = Math.random() > 0.5 ? '#333' : '#111';
            rctx.fillRect(Math.random()*256, Math.random()*256, 2, 2);
        }
        rctx.fillStyle = '#da0'; // Lane lines
        rctx.fillRect(120, 0, 16, 100);
        rctx.fillRect(120, 156, 16, 100);
        textures.road = new THREE.CanvasTexture(roadCanvas);
        textures.road.wrapS = textures.road.wrapT = THREE.RepeatWrapping;
        textures.road.repeat.set(20, 20);
        textures.road.magFilter = THREE.NearestFilter;
        
        // Building Windows Texture
        const bCanvas = document.createElement('canvas');
        bCanvas.width = 256; bCanvas.height = 256;
        const bctx = bCanvas.getContext('2d');
        bctx.fillStyle = '#1a1a1a'; bctx.fillRect(0,0,256,256);
        for(let x=10; x<256; x+=30) {
            for(let y=10; y<256; y+=40) {
                bctx.fillStyle = Math.random() > 0.8 ? '#aaaa55' : '#050505'; // Lit or unlit windows
                bctx.fillRect(x, y, 15, 25);
            }
        }
        textures.building = new THREE.CanvasTexture(bCanvas);
        textures.building.wrapS = textures.building.wrapT = THREE.RepeatWrapping;
        textures.building.repeat.set(4, 4);
        textures.building.magFilter = THREE.NearestFilter;

        // Zombie Skin (Pale with blood)
        const zSkin = document.createElement('canvas');
        zSkin.width = 64; zSkin.height = 64;
        const zctx = zSkin.getContext('2d');
        zctx.fillStyle = '#8b9385'; zctx.fillRect(0,0,64,64);
        for(let i=0; i<30; i++) {
            zctx.fillStyle = 'rgba(120, 10, 10, 0.7)';
            zctx.beginPath(); zctx.arc(Math.random()*64, Math.random()*64, Math.random()*5, 0, Math.PI*2); zctx.fill();
        }
        textures.zSkin = new THREE.CanvasTexture(zSkin);
        textures.zSkin.magFilter = THREE.NearestFilter;

        // Zombie Shirt (White/Dirty with heavy blood)
        const zShirt = document.createElement('canvas');
        zShirt.width = 64; zShirt.height = 64;
        const sctx = zShirt.getContext('2d');
        sctx.fillStyle = '#c8c8c0'; sctx.fillRect(0,0,64,64); 
        for(let i=0; i<50; i++) {
            sctx.fillStyle = 'rgba(130, 0, 0, 0.85)';
            sctx.fillRect(Math.random()*64, Math.random()*64, Math.random()*20, Math.random()*20);
        }
        textures.zShirt = new THREE.CanvasTexture(zShirt);
        textures.zShirt.magFilter = THREE.NearestFilter;
        
        // Zombie Pants (Dark brown with dirt)
        const zPants = document.createElement('canvas');
        zPants.width = 64; zPants.height = 64;
        const pctx = zPants.getContext('2d');
        pctx.fillStyle = '#3a3028'; pctx.fillRect(0,0,64,64);
        for(let i=0; i<40; i++) {
            pctx.fillStyle = 'rgba(20, 20, 20, 0.5)';
            pctx.fillRect(Math.random()*64, Math.random()*64, Math.random()*10, Math.random()*10);
        }
        textures.zPants = new THREE.CanvasTexture(zPants);
        textures.zPants.magFilter = THREE.NearestFilter;
    }

    // --- Environment Builder ---
    function buildArena() {
        // City Floor
        const floorGeo = new THREE.PlaneGeometry(1000, 1000);
        const floorMat = new THREE.MeshLambertMaterial({ map: textures.road });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const buildMat = new THREE.MeshLambertMaterial({ map: textures.building });
        const perimeterMat = new THREE.MeshLambertMaterial({ color: 0x0a0a0a });

        // Generate City Blocks
        const blockSize = 80;
        const roadWidth = 40;
        const step = blockSize + roadWidth;

        for (let x = -400; x <= 400; x += step) {
            for (let z = -400; z <= 400; z += step) {
                // Keep the central intersection clear for spawn
                if (Math.abs(x) < 100 && Math.abs(z) < 100) continue; 
                
                // Building
                let height = 60 + Math.random() * 140;
                const buildingGeo = new THREE.BoxGeometry(blockSize, height, blockSize);
                const building = new THREE.Mesh(buildingGeo, buildMat);
                building.position.set(x, height / 2, z);
                scene.add(building);
                objects.push(building);

                // Add some rubble around buildings
                if (Math.random() < 0.4) {
                    const rubbleGeo = new THREE.BoxGeometry(10+Math.random()*20, 10+Math.random()*15, 10+Math.random()*20);
                    const rubbleMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
                    const rubble = new THREE.Mesh(rubbleGeo, rubbleMat);
                    rubble.position.set(x + (Math.random()-0.5)*blockSize, 5, z + (Math.random()-0.5)*blockSize);
                    rubble.rotation.set(Math.random(), Math.random(), Math.random());
                    scene.add(rubble);
                    objects.push(rubble);
                }
            }
        }

        // Enclosing Walls
        const createWall = (x, z, w, d) => {
            const geo = new THREE.BoxGeometry(w, 200, d);
            const mesh = new THREE.Mesh(geo, perimeterMat);
            mesh.position.set(x, 100, z);
            scene.add(mesh);
            objects.push(mesh);
        };

        createWall(0, -500, 1000, 20); // North
        createWall(0, 500, 1000, 20);  // South
        createWall(-500, 0, 20, 1000); // West
        createWall(500, 0, 20, 1000);  // East
    }

    // --- Weapon System ---
    function createWeapon() {
        weaponPivot = new THREE.Group();
        weaponPivot.position.set(1.5, -1.5, -3); // Positioned bottom right
        camera.add(weaponPivot); // Attach to camera

        const metalMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.3 });
        const woodMat = new THREE.MeshStandardMaterial({ color: 0x5c3a21, roughness: 0.8 });

        // Receiver
        const receiver = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.6, 1.8), metalMat);
        receiver.position.set(0, 0, -0.5);
        weaponPivot.add(receiver);

        // Barrel
        const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 1.5, 8), metalMat);
        barrel.rotation.x = Math.PI / 2;
        barrel.position.set(0, 0.1, -2.0);
        weaponPivot.add(barrel);

        // Gas tube
        const gasTube = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.8, 8), metalMat);
        gasTube.rotation.x = Math.PI / 2;
        gasTube.position.set(0, 0.2, -1.5);
        weaponPivot.add(gasTube);

        // Handguard
        const handguard = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.25, 0.8), woodMat);
        handguard.position.set(0, 0.05, -1.5);
        weaponPivot.add(handguard);

        // Magazine
        const magGroup = new THREE.Group();
        magGroup.position.set(0, -0.4, -0.8);
        const mag1 = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.6, 0.4), metalMat);
        mag1.rotation.x = 0.2;
        const mag2 = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.5, 0.4), metalMat);
        mag2.position.set(0, -0.4, 0.1);
        mag2.rotation.x = 0.4;
        magGroup.add(mag1, mag2);
        weaponPivot.add(magGroup);

        // Grip
        const grip = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.5, 0.3), woodMat);
        grip.position.set(0, -0.4, 0.1);
        grip.rotation.x = -0.2;
        weaponPivot.add(grip);

        // Stock
        const stock = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.5, 1.2), woodMat);
        stock.position.set(0, -0.1, 0.8);
        stock.rotation.x = -0.1;
        weaponPivot.add(stock);

        // Muzzle Flash
        const flashGeo = new THREE.PlaneGeometry(1.5, 1.5);
        const flashMat = new THREE.MeshBasicMaterial({ 
            color: 0xffaa00, 
            transparent: true, 
            opacity: 0,
            side: THREE.DoubleSide,
            blending: THREE.AdditiveBlending
        });
        muzzleFlash = new THREE.Mesh(flashGeo, flashMat);
        muzzleFlash.position.set(0, 0.1, -3.0);
        const flash2 = new THREE.Mesh(flashGeo, flashMat);
        flash2.rotation.y = Math.PI / 2;
        muzzleFlash.add(flash2);
        
        weaponPivot.add(muzzleFlash);
    }

    // --- Game Logic ---
    function shoot() {
        const time = performance.now() / 1000;
        if (time - state.lastFireTime < config.fireRate || state.ammo <= 0) return;

        state.lastFireTime = time;
        state.ammo--;
        updateUI();

        // Recoil effect triggers
        isFiring = true;
        recoilTime = 0;
        muzzleFlash.material.opacity = 1;
        muzzleFlash.children[0].material.opacity = 1;

        // Raycast from center of screen
        raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);

        // Check against enemies and walls (true for recursive checking of children)
        const intersects = raycaster.intersectObjects([...enemies, ...objects], true);

        if (intersects.length > 0) {
            const hit = intersects[0];
            
            let target = hit.object;
            let isEnemyHit = false;
            let rootEnemy = null;

            if (target.userData && target.userData.isEnemyPart) {
                isEnemyHit = true;
                rootEnemy = target.userData.root;
            }

            // Spawn hit particle (Red blood vs Gray debris)
            createParticleBurst(hit.point, hit.face.normal, isEnemyHit ? 0xaa0000 : 0x555555);

            if (isEnemyHit && rootEnemy) {
                damageEnemy(rootEnemy);
            }
        }
    }

    function createParticleBurst(position, normal, colorHex) {
        const pGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
        const pMat = new THREE.MeshBasicMaterial({ color: colorHex });
        
        for(let i=0; i<5; i++) {
            const particle = new THREE.Mesh(pGeo, pMat);
            particle.position.copy(position);
            // Push slightly out along normal to prevent z-fighting with wall
            particle.position.addScaledVector(normal, 0.1); 
            
            // Random velocity roughly outwards
            particle.velocity = new THREE.Vector3(
                (Math.random() - 0.5) * 20 + normal.x * 10,
                (Math.random() - 0.5) * 20 + normal.y * 10,
                (Math.random() - 0.5) * 20 + normal.z * 10
            );
            particle.life = 1.0; // 1 second lifetime
            
            scene.add(particle);
            particles.push(particle);
        }
    }

    function spawnEnemy() {
        const enemyGroup = new THREE.Group();
        enemyGroup.isEnemy = true;
        enemyGroup.health = config.enemyHealthBase;
        enemyGroup.id = Math.random() * 1000;
        enemyGroup.walkCycle = Math.random() * Math.PI * 2; // Random start phase
        enemyGroup.lastAttackTime = 0; // Initialize cooldown

        // Materials are created per-enemy so flashing one doesn't flash all
        const skinMat = new THREE.MeshLambertMaterial({ map: textures.zSkin });
        const shirtMat = new THREE.MeshLambertMaterial({ map: textures.zShirt });
        const pantsMat = new THREE.MeshLambertMaterial({ map: textures.zPants });
        const darkMat = new THREE.MeshLambertMaterial({ color: 0x111111 });

        // Head Group (Head + Eyes + Mouth)
        const headGroup = new THREE.Group();
        headGroup.position.set(0, 14, 0);
        const headMesh = new THREE.Mesh(new THREE.BoxGeometry(4, 4.5, 4), skinMat);
        const leftEye = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.2), darkMat);
        leftEye.position.set(-1, 0.5, 2.05);
        const rightEye = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.2), darkMat);
        rightEye.position.set(1, 0.5, 2.05);
        const mouth = new THREE.Mesh(new THREE.BoxGeometry(2, 1.2, 0.2), darkMat);
        mouth.position.set(0, -1, 2.05);
        headGroup.add(headMesh, leftEye, rightEye, mouth);
        
        // Torso
        const torso = new THREE.Mesh(new THREE.BoxGeometry(6, 8, 3.5), shirtMat);
        torso.position.set(0, 8, 0);

        // Arms (Pivots at shoulder, with torn sleeves)
        const leftArmPivot = new THREE.Group();
        leftArmPivot.position.set(-4, 11, 0);
        const leftSleeve = new THREE.Mesh(new THREE.BoxGeometry(2.5, 3.5, 2.5), shirtMat);
        leftSleeve.position.set(0, -1, 0);
        const leftArm = new THREE.Mesh(new THREE.BoxGeometry(2, 8, 2), skinMat);
        leftArm.position.set(0, -3.5, 0);
        leftArmPivot.add(leftSleeve, leftArm);
        leftArmPivot.rotation.x = Math.PI / 2.5; // Raised forward
        
        const rightArmPivot = new THREE.Group();
        rightArmPivot.position.set(4, 11, 0);
        const rightSleeve = new THREE.Mesh(new THREE.BoxGeometry(2.5, 3.5, 2.5), shirtMat);
        rightSleeve.position.set(0, -1, 0);
        const rightArm = new THREE.Mesh(new THREE.BoxGeometry(2, 8, 2), skinMat);
        rightArm.position.set(0, -3.5, 0);
        rightArmPivot.add(rightSleeve, rightArm);
        rightArmPivot.rotation.x = Math.PI / 2.2; // Slightly offset

        // Legs (Pivots at hip, torn pants showing knee)
        const leftLegPivot = new THREE.Group();
        leftLegPivot.position.set(-1.8, 8, 0);
        const leftLeg = new THREE.Mesh(new THREE.BoxGeometry(2.6, 8, 2.6), pantsMat);
        leftLeg.position.set(0, -4, 0);
        const leftKnee = new THREE.Mesh(new THREE.BoxGeometry(2.7, 2, 2.7), skinMat);
        leftKnee.position.set(0, -4, 0.5); // Protrude slightly as exposed knee
        leftLegPivot.add(leftLeg, leftKnee);

        const rightLegPivot = new THREE.Group();
        rightLegPivot.position.set(1.8, 8, 0);
        const rightLeg = new THREE.Mesh(new THREE.BoxGeometry(2.6, 8, 2.6), pantsMat);
        rightLeg.position.set(0, -4, 0);
        rightLegPivot.add(rightLeg);

        enemyGroup.add(headGroup, torso, leftArmPivot, rightArmPivot, leftLegPivot, rightLegPivot);

        // Attach references for animation
        enemyGroup.leftLeg = leftLegPivot;
        enemyGroup.rightLeg = rightLegPivot;
        enemyGroup.leftArm = leftArmPivot;
        enemyGroup.rightArm = rightArmPivot;

        // Make raycaster work by recursively tagging meshes
        enemyGroup.children.forEach(child => {
            if (child.isMesh) {
                child.userData = { isEnemyPart: true, root: enemyGroup };
            } else if (child.type === 'Group') {
                child.children.forEach(subchild => {
                    if(subchild.isMesh) subchild.userData = { isEnemyPart: true, root: enemyGroup };
                });
            }
        });

        // Spawn randomly but away from player
        let px, pz;
        do {
            px = (Math.random() - 0.5) * 800; // Expanded to fit city
            pz = (Math.random() - 0.5) * 800;
        } while (Math.abs(px - camera.position.x) < 80 && Math.abs(pz - camera.position.z) < 80);

        enemyGroup.position.set(px, 0, pz); // Ground level
        
        scene.add(enemyGroup);
        enemies.push(enemyGroup);
    }

    function spawnWave() {
        const count = 3 + (state.wave * 2);
        for(let i=0; i<count; i++) {
            spawnEnemy();
        }
        // Give ammo every wave
        state.ammo = Math.min(config.maxAmmo, state.ammo + 20 + state.wave * 5);
        state.health = Math.min(config.maxHealth, state.health + 20);
        updateUI();
    }

    function damageEnemy(enemy) {
        enemy.health--;
        if (enemy.health <= 0) {
            // Die
            scene.remove(enemy);
            enemies.splice(enemies.indexOf(enemy), 1);
            state.frags++;
            updateUI();

            // Check wave completion
            if (enemies.length === 0) {
                state.wave++;
                setTimeout(spawnWave, 2000);
            }
        } else {
            // Flash all parts when hit
            enemy.children.forEach(child => {
                if (child.isMesh && child.material.emissive) child.material.emissive.setHex(0x550000); // Red flash
                else if (child.type === 'Group') {
                    child.children.forEach(sub => {
                        if (sub.isMesh && sub.material.emissive) sub.material.emissive.setHex(0x550000);
                    });
                }
            });
            setTimeout(() => {
                if(enemy && scene.children.includes(enemy)) {
                    enemy.children.forEach(child => {
                        if (child.isMesh && child.material.emissive) child.material.emissive.setHex(0x000000);
                        else if (child.type === 'Group') {
                            child.children.forEach(sub => {
                                if (sub.isMesh && sub.material.emissive) sub.material.emissive.setHex(0x000000);
                            });
                        }
                    });
                }
            }, 100);
        }
    }

    function takeDamage(amount) {
        state.health -= amount;
        damageOverlay.style.backgroundColor = 'rgba(255, 0, 0, 0.4)';
        setTimeout(() => {
            damageOverlay.style.backgroundColor = 'rgba(255, 0, 0, 0)';
        }, 150);

        updateUI();

        if (state.health <= 0) {
            gameOver();
        }
    }

    function gameOver() {
        state.isGameOver = true;
        controls.unlock();
        startBtn.innerText = "RESTART";
        document.querySelector('#blocker h1').innerText = "YOU DIED";
        blocker.style.display = 'flex';
    }

    function resetGame() {
        state = {
            health: config.maxHealth,
            ammo: 50,
            frags: 0,
            wave: 1,
            isGameOver: false,
            lastFireTime: 0
        };
        
        // Clear enemies
        enemies.forEach(e => scene.remove(e));
        enemies.length = 0;
        
        // Reset player position
        controls.getObject().position.set(0, config.playerHeight, 0);
        velocity.set(0,0,0);

        updateUI();
        document.querySelector('#blocker h1').innerText = "WEBARENA";
        spawnWave();
    }

    function updateUI() {
        healthDisplay.innerText = Math.max(0, state.health);
        ammoDisplay.innerText = state.ammo;
        scoreDisplay.innerText = `FRAGS: ${state.frags}`;
        waveDisplay.innerText = `WAVE: ${state.wave}`;
    }

    // --- Main Loop ---
    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);

        const time = performance.now();
        const delta = (time - prevTime) / 1000; // convert to seconds

        if (controls.isLocked === true) {
            // --- Player Physics & Movement ---
            velocity.x -= velocity.x * 10.0 * delta; // Friction
            velocity.z -= velocity.z * 10.0 * delta; // Friction
            velocity.y -= config.gravity * delta; // Falling

            direction.z = Number(moveForward) - Number(moveBackward);
            direction.x = Number(moveRight) - Number(moveLeft);
            direction.normalize();

            // Apply acceleration
            if (moveForward || moveBackward) velocity.z -= direction.z * config.playerSpeed * delta;
            if (moveLeft || moveRight) velocity.x -= direction.x * config.playerSpeed * delta;

            const camObj = controls.getObject();
            
            // 1. Vertical (Y) Movement & Collision
            camObj.position.y += velocity.y * delta;
            
            let playerBox = new THREE.Box3().setFromCenterAndSize(
                new THREE.Vector3(camObj.position.x, camObj.position.y, camObj.position.z),
                new THREE.Vector3(5, config.playerHeight * 2, 5)
            );

            let onGround = false;

            // Floor collision
            if (camObj.position.y < config.playerHeight) {
                velocity.y = 0;
                camObj.position.y = config.playerHeight;
                onGround = true;
            }

            // Platform Y collision
            for (let i = 0; i < objects.length; i++) {
                const wallBox = new THREE.Box3().setFromObject(objects[i]);
                if (playerBox.intersectsBox(wallBox)) {
                    if (velocity.y < 0) { // Falling onto a platform
                        camObj.position.y = wallBox.max.y + config.playerHeight;
                        velocity.y = 0;
                        onGround = true;
                    } else if (velocity.y > 0) { // Jumping into a ceiling
                        camObj.position.y = wallBox.min.y - config.playerHeight;
                        velocity.y = 0;
                    }
                }
            }
            
            canJump = onGround;

            // 2. Horizontal (Local X) Movement & Collision
            const origX = camObj.position.x;
            const origZ = camObj.position.z;
            
            controls.moveRight(-velocity.x * delta);
            
            playerBox.setFromCenterAndSize(
                new THREE.Vector3(camObj.position.x, camObj.position.y, camObj.position.z),
                new THREE.Vector3(5, config.playerHeight * 2, 5)
            );
            
            for (let i = 0; i < objects.length; i++) {
                const wallBox = new THREE.Box3().setFromObject(objects[i]);
                if (playerBox.intersectsBox(wallBox)) {
                    camObj.position.x = origX;
                    camObj.position.z = origZ;
                    velocity.x = 0;
                    break;
                }
            }

            // 3. Horizontal (Local Z) Movement & Collision
            const afterX = camObj.position.x;
            const afterZ = camObj.position.z;
            
            controls.moveForward(-velocity.z * delta);
            
            playerBox.setFromCenterAndSize(
                new THREE.Vector3(camObj.position.x, camObj.position.y, camObj.position.z),
                new THREE.Vector3(5, config.playerHeight * 2, 5)
            );
            
            for (let i = 0; i < objects.length; i++) {
                const wallBox = new THREE.Box3().setFromObject(objects[i]);
                if (playerBox.intersectsBox(wallBox)) {
                    camObj.position.x = afterX;
                    camObj.position.z = afterZ;
                    velocity.z = 0;
                    break;
                }
            }

            // --- Weapon Animation ---
            // Bobbing effect when walking
            if ((moveForward || moveBackward || moveLeft || moveRight) && canJump) {
                const bobTime = time * 0.01;
                weaponPivot.position.y = -1.5 + Math.sin(bobTime) * 0.1;
                weaponPivot.position.x = 1.5 + Math.cos(bobTime) * 0.1;
            } else {
                weaponPivot.position.y = THREE.MathUtils.lerp(weaponPivot.position.y, -1.5, 0.1);
                weaponPivot.position.x = THREE.MathUtils.lerp(weaponPivot.position.x, 1.5, 0.1);
            }

            // Recoil effect
            if (isFiring) {
                recoilTime += delta;
                if (recoilTime < 0.05) {
                    weaponPivot.rotation.x = THREE.MathUtils.lerp(weaponPivot.rotation.x, 0.2, 0.5);
                    weaponPivot.position.z = THREE.MathUtils.lerp(weaponPivot.position.z, -2.5, 0.5);
                } else if (recoilTime < 0.2) {
                    weaponPivot.rotation.x = THREE.MathUtils.lerp(weaponPivot.rotation.x, 0, 0.2);
                    weaponPivot.position.z = THREE.MathUtils.lerp(weaponPivot.position.z, -3, 0.2);
                    muzzleFlash.material.opacity = 0; // hide flash rapidly
                    muzzleFlash.children[0].material.opacity = 0;
                } else {
                    isFiring = false;
                    weaponPivot.rotation.x = 0;
                    weaponPivot.position.z = -3;
                }
            }

            // --- Enemy AI & Logic ---
            const playerPos = camObj.position;
            enemies.forEach(enemy => {
                // Look at player (only Y axis rotation to stay upright)
                const targetPos = new THREE.Vector3(playerPos.x, enemy.position.y, playerPos.z);
                enemy.lookAt(targetPos);

                // Calculate horizontal distance
                const dist = enemy.position.distanceTo(targetPos);
                
                // 1. Movement Logic (Move if further than 8 units)
                if (dist > 8) {
                    enemy.translateZ(config.enemySpeed * delta);
                    
                    // Zombie walk animation
                    enemy.walkCycle += config.enemySpeed * delta * 0.15;
                    enemy.leftLeg.rotation.x = Math.sin(enemy.walkCycle) * 0.6;
                    enemy.rightLeg.rotation.x = Math.sin(enemy.walkCycle + Math.PI) * 0.6;
                    
                    // Zombie arm sway
                    enemy.leftArm.rotation.z = Math.sin(enemy.walkCycle) * 0.1;
                    enemy.rightArm.rotation.z = Math.sin(enemy.walkCycle + Math.PI) * 0.1;
                    
                    // Limp/bob effect on root y position
                    enemy.position.y = Math.abs(Math.sin(enemy.walkCycle * 2)) * 1.5;
                }
                
                // 2. Attack Logic (Attack if closer than 12 units - overlaps movement stop to prevent deadzones)
                if (dist <= 12) {
                    if (time - enemy.lastAttackTime > 1500) { // 1.5 second reliable cooldown instead of random chance
                        enemy.lastAttackTime = time;
                        takeDamage(config.enemyDamage);
                        
                        // Lunge animation
                        enemy.position.addScaledVector(enemy.getWorldDirection(new THREE.Vector3()), 4);
                        setTimeout(() => {
                             if(enemy && scene.children.includes(enemy)) {
                                 enemy.position.addScaledVector(enemy.getWorldDirection(new THREE.Vector3()), -4);
                             }
                        }, 150);
                    }
                }
            });

            // --- Particle Physics ---
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.position.addScaledVector(p.velocity, delta);
                p.velocity.y -= config.gravity * delta * 0.5; // gravity on particles
                
                // shrink
                p.scale.multiplyScalar(0.9);
                p.life -= delta;

                if (p.life <= 0) {
                    scene.remove(p);
                    particles.splice(i, 1);
                }
            }
        }

        renderer.render(scene, camera);
        prevTime = time;
    }
};
</script>
</body>
